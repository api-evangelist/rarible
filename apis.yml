apis:
  - aid: rarible:nft-api
    name: Rarible NFT API
    description: >-
      Core REST API for querying NFT items and collections across supported
      blockchains. Provides endpoints to retrieve NFTs by ID, collection,
      creator, or owner; access royalty information; reset metadata; and
      query ownership records. Supports multichain item resolution via the
      unified api.rarible.org base URL with an X-API-KEY header for
      authentication.
    humanURL: https://docs.rarible.org/docs/introduction
    baseURL: https://api.rarible.org/v0.1
    tags:
      - NFT
      - Items
      - Collections
      - Ownership
      - Metadata
      - Royalties
    properties:
      - type: Documentation
        url: https://docs.rarible.org/docs/introduction
      - type: OpenAPI
        url: https://github.com/rarible/union-openapi
      - type: SignUp
        url: https://rarible.org/
      - type: Authentication
        url: https://docs.rarible.org/docs/authentication

  - aid: rarible:orders-api
    name: Rarible Orders API
    description: >-
      REST API for accessing and interacting with NFT order books aggregated
      from multiple marketplaces including OpenSea and Rarible. Provides
      endpoints for getting all orders, retrieving orders by ID, fetching
      sell and bid orders, preparing order transactions, creating and
      updating orders, validating orders, and cancelling orders.
      Enables building NFT trading functionality with aggregated liquidity.
    humanURL: https://docs.rarible.org/docs/introduction
    baseURL: https://api.rarible.org/v0.1
    tags:
      - Orders
      - Order Book
      - Bids
      - Listings
      - Trading
      - Aggregator
    properties:
      - type: Documentation
        url: https://docs.rarible.org/docs/introduction
      - type: OpenAPI
        url: https://github.com/rarible/union-openapi
      - type: SignUp
        url: https://rarible.org/

  - aid: rarible:activities-api
    name: Rarible Activities API
    description: >-
      REST API for querying historical NFT trading activities and events
      across supported blockchains. Endpoints support searching activities
      by collection, item, or user, and a general search with a sync variant
      for stream processing. Useful for building trading history feeds,
      analytics dashboards, and provenance tracking tools.
    humanURL: https://docs.rarible.org/docs/data-analytics
    baseURL: https://api.rarible.org/v0.1
    tags:
      - Activities
      - Events
      - History
      - Provenance
      - Analytics
      - Transactions
    properties:
      - type: Documentation
        url: https://docs.rarible.org/docs/data-analytics
      - type: OpenAPI
        url: https://github.com/rarible/union-openapi
      - type: SignUp
        url: https://rarible.org/

  - aid: rarible:collections-api
    name: Rarible Collections API
    description: >-
      REST API for accessing NFT collection data, statistics, and rankings.
      Endpoints include get all collections, get by ID or owner, reset
      metadata, get floor prices, volume rankings, buyer and seller
      statistics, GMV, listing stats, and transaction statistics. Powers
      collection discovery pages, analytics tools, and market intelligence
      dashboards.
    humanURL: https://docs.rarible.org/docs/introduction
    baseURL: https://api.rarible.org/v0.1
    tags:
      - Collections
      - Floor Price
      - Volume
      - Rankings
      - Statistics
      - Analytics
    properties:
      - type: Documentation
        url: https://docs.rarible.org/docs/introduction
      - type: OpenAPI
        url: https://github.com/rarible/union-openapi
      - type: SignUp
        url: https://rarible.org/

