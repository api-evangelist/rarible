aid: rarible
url: https://raw.githubusercontent.com/api-evangelist/rarible/refs/heads/main/apis.yml
name: Rarible
kind: company
description: >-
  Rarible is a multichain NFT marketplace and aggregator providing a unified
  REST API for searching, trading, and managing NFTs across Ethereum, Polygon,
  Arbitrum, Flow, IMX, and Chiliz. The platform operates as both a consumer
  marketplace and a B2B API infrastructure layer powering over 5,000 NFT
  applications. The Rarible API exposes endpoints for querying NFT items and
  collections, order books (aggregated from OpenSea, Rarible, and other
  venues), ownership records, trading activities, floor prices, volume
  rankings, and OLAP-style analytics. An integrated TypeScript SDK handles
  wallet connections, NFT minting, listing, bidding, and purchases through
  a single toolkit. Developers can implement custom front-end fees on
  transactions, enabling direct monetisation on top of the Rarible
  infrastructure. The platform indexes over 1 billion NFTs and 91 million
  trades and maintains 99.99% uptime.
