openapi: 3.0.3
info:
  title: OpenAPI definition Charts NFT Items API
  version: v0.1
  description: '# Exciting News


    Hey there, amazing developers! 👋


    We''ve got some fantastic news to share that will make your experience with our product even better. We''re thrilled to announce the implementation of API-Keys, which brings a new level of control and convenience to your development process. So, let''s dive right into the details! ✨


    ## API-Keys for Enhanced Functionality 🔑


    Starting now, we have introduced API-Keys to streamline your interactions with our methods. You might have noticed a slight change while making requests – now, all you need to do is include the parameter `X-API-KEY` in the Header of your request. Simple as that!


    ## Get Your API-Key in a Snap! ⚡️


    Securing your API-Key is a breeze. We''ve made the process super user-friendly to ensure you can get started quickly. Just head over to our website and fill out a simple form. Once you''ve done that, your shiny new API-Key will be delivered straight to your email inbox. Easy peasy! 📧


    [Get Your API-Key Here](https://api.rarible.org/registration)

    [Configure SDK with API-key](https://github.com/rarible/sdk#api-querying)


    ## Unlock the Power of the Rarible Protocol 🔓


    As passionate developers, we know you''re always hungry for knowledge and eager to explore new frontiers. That''s why we invite you to discover the incredible world of the Rarible Protocol. By visiting our dedicated protocol page, you''ll gain access to a treasure trove of useful information, tips, and insights that will elevate your development skills to new heights. 🚀


    [Explore the Rarible Protocol](https://rarible.org)


    So, buckle up and get ready for an enhanced development journey with our API-Keys. We''re excited to see what you''ll create using our revamped system! 💪🚀


    Stay curious, keep innovating, and happy coding! ✨


    [P.S. Join our Discord Server to stay up to date and ask questions](https://discord.gg/rarifoundation)

    '
servers:
- url: https://{environment}.rarible.org
  description: Production (Mainnet)
  variables:
    environment:
      enum:
      - api
      - testnet-api
      default: api
security:
- ApiKeyAuth: []
tags:
- name: NFT Items
  x-controller: ItemController
paths:
  /v0.1/items/{itemId}:
    get:
      tags:
      - NFT Items
      summary: Get NFT by Id
      description: Returns NFT Item by Id
      operationId: getItemById
      parameters:
      - name: itemId
        in: path
        required: true
        description: ItemId in format `ETHEREUM:${token}:${tokenId}`
        schema:
          $ref: '#/components/schemas/ItemId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          $ref: '#/components/responses/EntityNotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/byIds:
    post:
      tags:
      - NFT Items
      summary: Get NFT by Ids
      description: Returns NFT Items by specified list of Ids
      operationId: getItemByIds
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemIds'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
        '404':
          $ref: '#/components/responses/EntityNotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/{itemId}/royalties:
    get:
      tags:
      - NFT Items
      summary: Get NFT royalties by Id
      description: Returns NFT royalties by Id
      operationId: getItemRoyaltiesById
      parameters:
      - name: itemId
        in: path
        required: true
        description: Item Id in format `ETHEREUM:${token}:${tokenId}`
        schema:
          $ref: '#/components/schemas/ItemId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Royalties'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/{itemId}/resetMeta:
    delete:
      tags:
      - NFT Items
      summary: Reset NFT metadata
      description: Reloads NFT metadata from the source. If source not available, old metadata stays.
      operationId: resetItemMeta
      parameters:
      - name: itemId
        in: path
        required: true
        description: Item Id in format `ETHEREUM:${token}:${tokenId}`
        schema:
          $ref: '#/components/schemas/ItemId'
      - name: sync
        in: query
        required: false
        description: Request meta for Item if true
        schema:
          type: boolean
      responses:
        '200':
          description: OK
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/byOwner:
    get:
      tags:
      - NFT Items
      summary: Get NFT owned by user
      description: Returns list of NFTs belong to specified user and sorted by `last updated` date
      operationId: getItemsByOwner
      parameters:
      - name: blockchains
        description: Since user's address can be present in several blockchains (for example, ETHEREUM and POLYGON),  you can use this filter to get Orders only for specific blockchains.  Or keep it empty to get Order from all blockchains
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Blockchain'
      - name: owner
        in: query
        required: true
        description: Address of the item owner
        schema:
          $ref: '#/components/schemas/UnionAddress'
      - name: continuation
        in: query
        required: false
        description: Continuation token from the previous response
        schema:
          type: string
      - name: size
        in: query
        required: false
        description: The number of items to return
        schema:
          type: integer
      - name: searchEngine
        in: query
        required: false
        deprecated: true
        description: Search engine to use for search
        schema:
          $ref: '#/components/schemas/SearchEngine'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/byCreator:
    get:
      tags:
      - NFT Items
      summary: Get NFT created by user
      description: Returns list of NFTs created by specified user and sorted by `last updated` date
      operationId: getItemsByCreator
      parameters:
      - name: blockchains
        description: Since user's address can be present in several blockchains (for example, ETHEREUM and POLYGON),  you can use this filter to get Orders only for specific blockchains.  Or keep it empty to get Order from all blockchains
        in: query
        required: false
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Blockchain'
      - name: creator
        in: query
        required: true
        description: Address of the item creator
        schema:
          $ref: '#/components/schemas/UnionAddress'
      - name: continuation
        in: query
        required: false
        description: Continuation token from the previous response
        schema:
          type: string
      - name: size
        in: query
        required: false
        description: The number of items to return
        schema:
          type: integer
      - name: searchEngine
        in: query
        required: false
        deprecated: true
        description: Search engine to use for search
        schema:
          $ref: '#/components/schemas/SearchEngine'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/byCollection:
    get:
      tags:
      - NFT Items
      summary: Get NFT from collection
      description: Returns list of NFTs from specified collection and sorted by `last updated` date
      operationId: getItemsByCollection
      parameters:
      - name: collection
        in: query
        required: true
        description: Address of the collection
        schema:
          $ref: '#/components/schemas/ContractAddress'
      - name: continuation
        in: query
        required: false
        description: Continuation token from the previous response
        schema:
          type: string
      - name: size
        in: query
        required: false
        description: The number of items to return
        schema:
          type: integer
      - name: searchEngine
        in: query
        required: false
        deprecated: true
        description: Search engine to use for search
        schema:
          $ref: '#/components/schemas/SearchEngine'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/byOwnerWithOwnership:
    get:
      tags:
      - NFT Items
      summary: Get NFT owned by user - detailed
      description: Returns list of NFTs belong to specified user and sorted by `last updated` date of ownership
      operationId: getItemsByOwnerWithOwnership
      parameters:
      - name: owner
        in: query
        required: true
        description: Address of the owner
        schema:
          $ref: '#/components/schemas/UnionAddress'
      - name: continuation
        in: query
        required: false
        description: Continuation token from the previous response
        schema:
          type: string
      - name: size
        in: query
        required: false
        description: The number of items to return
        schema:
          type: integer
      - name: searchEngine
        in: query
        required: false
        deprecated: true
        description: Search engine to use for search
        schema:
          $ref: '#/components/schemas/SearchEngine'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsWithOwnership'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/all:
    get:
      deprecated: true
      tags:
      - NFT Items
      summary: Get all NFTs
      description: Returns all NFT Items in accordance with specified filters and sorted by `last updated` date
      operationId: getAllItems
      parameters:
      - name: blockchains
        in: query
        required: false
        description: Names of the blockchain networks. If no one specified, NFTs from all blockchains will be returned
        schema:
          type: array
          items:
            $ref: '#/components/schemas/Blockchain'
      - name: continuation
        in: query
        required: false
        description: Continuation token from the previous response
        schema:
          type: string
      - name: size
        in: query
        required: false
        description: The number of items to return
        schema:
          type: integer
      - name: showDeleted
        in: query
        required: false
        description: Include deleted items
        schema:
          type: boolean
      - name: lastUpdatedFrom
        in: query
        required: false
        description: Filter condition to return only items that have been updated after this date (timestamp)
        schema:
          type: integer
          format: int64
      - name: lastUpdatedTo
        in: query
        required: false
        description: Filter condition to return only items that have been updated before this date (timestamp)
        schema:
          type: integer
          format: int64
      - name: searchEngine
        in: query
        required: false
        deprecated: true
        description: Search engine to use for search
        schema:
          $ref: '#/components/schemas/SearchEngine'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/traits:
    get:
      tags:
      - NFT Items
      summary: Get NFT collection traits
      description: Returns aggregation of existing traits for specified collections with counter for each trait type/value.
      operationId: queryTraits
      parameters:
      - name: keys
        description: Trait keys for strict filtering (if not specified - all traits will be returned)
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            example: Hat
      - name: collectionIds
        description: Collections identifiers to which traits belong
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            example: ETHEREUM:0x60e4d786628fea6478f785a6d7e704777c86a7c6
      - name: owners
        description: Return traits only for items owned by user
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            example: ${filterOwners}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Traits'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/traits/rarity:
    post:
      tags:
      - NFT Items
      summary: Get NFT traits rarity
      description: Returns the rarity of the trait
      operationId: queryTraitsWithRarity
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraitsRarityRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtendedTraitProperties'
  /v0.1/items/lazy/{itemId}:
    get:
      tags:
      - NFT Items
      summary: Get Lazy NFT
      description: Returns Lazy NFT Item by Id
      operationId: getLazyItemById
      deprecated: true
      parameters:
      - name: itemId
        in: path
        required: true
        description: Item Id in format `ETHEREUM:${token}:${tokenId}`
        schema:
          $ref: '#/components/schemas/ItemId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LazyItem'
        '404':
          $ref: '#/components/responses/EntityNotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/lazy/mint:
    post:
      tags:
      - NFT Items
      summary: Mint Lazy NFT
      description: Create Lazy NFT (supported only for some blockchains)
      operationId: mintLazyItem
      deprecated: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LazyItemMintForm'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/EntityNotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/lazy/burn:
    post:
      tags:
      - NFT Items
      summary: Burn Lazy NFT
      description: Deletes Lazy NFT (supported only for some blockchains)
      operationId: burnLazyItem
      deprecated: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LazyItemBurnForm'
        required: true
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/EntityNotFound'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  schemas:
    EthErc1155LazyAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ERC1155_Lazy
        contract:
          $ref: '#/components/schemas/ContractAddress'
        collection:
          $ref: '#/components/schemas/CollectionId'
        tokenId:
          $ref: '#/components/schemas/BigInteger'
        uri:
          type: string
        supply:
          $ref: '#/components/schemas/BigInteger'
        creators:
          type: array
          description: Creators of the target item
          default: []
          items:
            $ref: '#/components/schemas/Creator'
        royalties:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Royalty'
        signatures:
          type: array
          default: []
          items:
            type: string
      required:
      - '@type'
      - contract
      - tokenId
      - uri
      - creators
      - supply
      - royalties
      - signatures
    ItemIds:
      type: object
      required:
      - ids
      properties:
        ids:
          type: array
          description: List of the item id
          items:
            $ref: '#/components/schemas/ItemId'
    Trait:
      title: Trait
      type: object
      description: Combination of Item attribute key with list of values
      required:
      - key
      - values
      properties:
        key:
          $ref: '#/components/schemas/TraitEntry'
        values:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TraitEntry'
    EthOrderBasicSeaportDataV1:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ETH_BASIC_SEAPORT_DATA_V1
      required:
      - '@type'
    UnionApiErrorServerError:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          enum:
          - UNKNOWN
          default: UNKNOWN
        message:
          type: string
          description: Error message
    ItemCollection:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/CollectionId'
        name:
          type: string
        bestBidOrder:
          $ref: '#/components/schemas/Order'
        bestSellOrder:
          $ref: '#/components/schemas/Order'
      required:
      - id
      - name
    Traits:
      type: object
      properties:
        continuation:
          type: string
          description: Continuation token to paginate traits search result
        traits:
          type: array
          description: List of found traits
          default: []
          items:
            $ref: '#/components/schemas/Trait'
      required:
      - traits
    SolanaSolAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - SOLANA_SOL
      required:
      - '@type'
    AssetType:
      type: object
      oneOf:
      - $ref: '#/components/schemas/NativeCurrencyAssetType'
      - $ref: '#/components/schemas/TokenCurrencyAssetType'
      - $ref: '#/components/schemas/NftAssetType'
      - $ref: '#/components/schemas/NftOfCollectionAssetType'
      - $ref: '#/components/schemas/EthEthereumAssetType'
      - $ref: '#/components/schemas/EthErc20AssetType'
      - $ref: '#/components/schemas/EthErc721AssetType'
      - $ref: '#/components/schemas/EthErc721LazyAssetType'
      - $ref: '#/components/schemas/EthErc1155AssetType'
      - $ref: '#/components/schemas/EthErc1155LazyAssetType'
      - $ref: '#/components/schemas/EthCryptoPunksAssetType'
      - $ref: '#/components/schemas/EthGenerativeArtAssetType'
      - $ref: '#/components/schemas/EthCollectionAssetType'
      - $ref: '#/components/schemas/SolanaNftAssetType'
      - $ref: '#/components/schemas/SolanaFtAssetType'
      - $ref: '#/components/schemas/SolanaSolAssetType'
    Meta:
      type: object
      properties:
        name:
          type: string
          description: Name of the NFT item
        description:
          type: string
          description: Description of the NFT item
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string
        language:
          description: Language in RFC 1176 format
          type: string
        rights:
          type: string
        rightsUri:
          type: string
        externalUri:
          description: URI to external page related to the Item
          type: string
        originalMetaUri:
          description: URI to the original meta JSON
          type: string
        attributes:
          type: array
          description: Attributes of the NFT item
          items:
            $ref: '#/components/schemas/MetaAttribute'
        content:
          type: array
          description: NFT content information
          items:
            $ref: '#/components/schemas/MetaContent'
        extraContent:
          type: array
          description: NFT additional content information
          items:
            $ref: '#/components/schemas/MetaContent'
      required:
      - name
      - attributes
      - content
    Payout:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/UnionAddress'
        value:
          type: integer
      required:
      - account
      - value
    BigDecimal:
      type: string
      example: 123456.789
    OrderData:
      type: object
      oneOf:
      - $ref: '#/components/schemas/RawOrderData'
      - $ref: '#/components/schemas/EthOrderDataLegacy'
      - $ref: '#/components/schemas/EthRaribleV2OrderData'
      - $ref: '#/components/schemas/EthOrderOpenSeaV1DataV1'
      - $ref: '#/components/schemas/EthOrderSeaportDataV1'
      - $ref: '#/components/schemas/EthOrderCryptoPunksData'
      - $ref: '#/components/schemas/SolanaAuctionHouseDataV1'
    EthErc20AssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ERC20
        contract:
          $ref: '#/components/schemas/ContractAddress'
      required:
      - '@type'
      - contract
    MetaAttribute:
      required:
      - key
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        type:
          type: string
        format:
          type: string
    EthLazyItemErc1155:
      type: object
      required:
      - '@type'
      - supply
      properties:
        '@type':
          type: string
          enum:
          - ETH_ERC1155
        supply:
          $ref: '#/components/schemas/BigInteger'
    Items:
      type: object
      properties:
        total:
          deprecated: true
          type: integer
          format: int64
          description: Number of items were found by request
        continuation:
          type: string
          description: Continuation token to paginate items search result
        items:
          type: array
          description: List of found items
          default: []
          items:
            $ref: '#/components/schemas/Item'
      required:
      - items
    EthOrderDataRaribleV2DataV3:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ETH_RARIBLE_V2_3
        payouts:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Payout'
        originFees:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Payout'
        isMakeFill:
          type: boolean
          description: If true, the 'fill' part of the order applies to the 'make' side, otherwise to the 'take' side
      required:
      - '@type'
      - payouts
      - originFees
      - isMakeFill
    ItemOwnership:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/OwnershipId'
        blockchain:
          $ref: '#/components/schemas/Blockchain'
        collection:
          $ref: '#/components/schemas/CollectionId'
        owner:
          $ref: '#/components/schemas/UnionAddress'
        value:
          $ref: '#/components/schemas/BigInteger'
        createdAt:
          type: string
          format: date-time
        creators:
          type: array
          description: Creators of the target item
          default: []
          items:
            $ref: '#/components/schemas/Creator'
        lazyValue:
          $ref: '#/components/schemas/BigInteger'
        version:
          type: integer
          format: int64
      required:
      - id
      - blockchain
      - owner
      - value
      - createdAt
      - creators
      - lazyValue
      - pending
    NftAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - NFT
        collectionId:
          $ref: '#/components/schemas/CollectionId'
        itemId:
          $ref: '#/components/schemas/ItemId'
        standard:
          type: string
          enum:
          - SINGLE
          - MULTIPLE
      required:
      - '@type'
      - itemId
      - collectionId
    LazyItemMintForm:
      type: object
      required:
      - item
      properties:
        item:
          $ref: '#/components/schemas/LazyItem'
    SolanaNftAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - SOLANA_NFT
        contract:
          $ref: '#/components/schemas/ContractAddress'
        collection:
          $ref: '#/components/schemas/CollectionId'
        itemId:
          $ref: '#/components/schemas/ItemId'
      required:
      - '@type'
      - itemId
