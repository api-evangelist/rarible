openapi: 3.0.3
info:
  title: OpenAPI definition Charts Search API API
  version: v0.1
  description: '# Exciting News


    Hey there, amazing developers! 👋


    We''ve got some fantastic news to share that will make your experience with our product even better. We''re thrilled to announce the implementation of API-Keys, which brings a new level of control and convenience to your development process. So, let''s dive right into the details! ✨


    ## API-Keys for Enhanced Functionality 🔑


    Starting now, we have introduced API-Keys to streamline your interactions with our methods. You might have noticed a slight change while making requests – now, all you need to do is include the parameter `X-API-KEY` in the Header of your request. Simple as that!


    ## Get Your API-Key in a Snap! ⚡️


    Securing your API-Key is a breeze. We''ve made the process super user-friendly to ensure you can get started quickly. Just head over to our website and fill out a simple form. Once you''ve done that, your shiny new API-Key will be delivered straight to your email inbox. Easy peasy! 📧


    [Get Your API-Key Here](https://api.rarible.org/registration)

    [Configure SDK with API-key](https://github.com/rarible/sdk#api-querying)


    ## Unlock the Power of the Rarible Protocol 🔓


    As passionate developers, we know you''re always hungry for knowledge and eager to explore new frontiers. That''s why we invite you to discover the incredible world of the Rarible Protocol. By visiting our dedicated protocol page, you''ll gain access to a treasure trove of useful information, tips, and insights that will elevate your development skills to new heights. 🚀


    [Explore the Rarible Protocol](https://rarible.org)


    So, buckle up and get ready for an enhanced development journey with our API-Keys. We''re excited to see what you''ll create using our revamped system! 💪🚀


    Stay curious, keep innovating, and happy coding! ✨


    [P.S. Join our Discord Server to stay up to date and ask questions](https://discord.gg/rarifoundation)

    '
servers:
- url: https://{environment}.rarible.org
  description: Production (Mainnet)
  variables:
    environment:
      enum:
      - api
      - testnet-api
      default: api
security:
- ApiKeyAuth: []
tags:
- name: Search API
  x-controller: SearchController
paths:
  /v0.1/items/traits/search:
    get:
      tags:
      - Search API
      summary: Search NFT collection traits
      description: Returns aggregation of existing traits for specified collections with counter for each trait type/value.\  This is full-text-search, where you can specify filter for trait keys not precisely\  (for example, results `back` filter include `Background` trait)
      operationId: searchTraits
      parameters:
      - name: filter
        description: filter
        in: query
        required: true
        schema:
          type: string
          example: Hat
      - name: collectionIds
        description: Collections identifiers to which traits belong
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
            example: ETHEREUM:0x60e4d786628fea6478f785a6d7e704777c86a7c6
      - name: owners
        description: Return traits only for items owned by user
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            example: ${filterOwners}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Traits'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/search:
    post:
      tags:
      - Search API
      summary: Search NFTs
      description: Advanced search returns NFTs satisfying provided filter
      operationId: searchItems
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemsSearchRequest'
            example:
              size: 10
              filter:
                blockchains:
                - ETHEREUM
                deleted: false
                sellPriceFrom: 0
                sellPriceTo: 100
                sellCurrency: ETHEREUM:0x0000000000000000000000000000000000000000
                lastUpdatedAtFrom: '2022-12-01T00:00:00Z'
                lastUpdatedAtTo: '2029-12-01T00:00:00Z'
              sort: EARLIEST
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Items'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/items/search/duplicates:
    post:
      tags:
      - Search API
      summary: Search Duplicated NFTs
      description: Advanced search returns NFTs satisfying provided filter and with duplicated traits
      operationId: searchDuplicatedItems
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DuplicatedItemsSearchRequest'
            example:
              size: 10
              filter:
                blockchains:
                - ETHEREUM
                deleted: false
                sellPriceFrom: 0
                sellPriceTo: 100
                sellCurrency: ETHEREUM:0x0000000000000000000000000000000000000000
                lastUpdatedAtFrom: '2022-12-01T00:00:00Z'
                lastUpdatedAtTo: '2029-12-01T00:00:00Z'
              traits:
              - series
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicatedItemGroups'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/ownerships/search:
    post:
      tags:
      - Search API
      summary: Search NFT Ownerships
      description: Advanced search returns NFT Ownerships satisfying provided filter
      operationId: searchOwnerships
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnershipSearchRequest'
            example:
              size: 10
              filter:
                blockchains:
                - ETHEREUM
                deleted: false
                sellPriceFrom: 0
                sellPriceTo: 100
                sellCurrency: ETHEREUM:0x0000000000000000000000000000000000000000
                lastUpdatedAtFrom: '2022-12-01T00:00:00Z'
                lastUpdatedAtTo: '2029-12-01T00:00:00Z'
              sort: EARLIEST
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ownerships'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/activities/search:
    post:
      tags:
      - Search API
      summary: Search Activities
      description: Advanced search returns Activities satisfying provided filter
      operationId: searchActivities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivitySearchRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activities'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/activities/search/count:
    post:
      tags:
      - Search API
      summary: Count activities that match the search request
      description: Advanced search returns the count of Activities satisfying provided filter
      operationId: searchActivitiesCount
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivitySearchFilter'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultCount'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /v0.1/collections/search:
    post:
      tags:
      - Search API
      summary: Search NFT Collections
      description: Advanced search returns NFT Collections satisfying provided filter
      operationId: searchCollection
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionsSearchRequest'
            example:
              size: 10
              filter:
                blockchains:
                - ETHEREUM
                text: Apes
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collections'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
components:
  schemas:
    ActivityType:
      type: string
      enum:
      - TRANSFER
      - MINT
      - BURN
      - BID
      - LIST
      - SELL
      - CANCEL_LIST
      - CANCEL_BID
      - BRIDGE_TO
      - BRIDGE_FROM
    EthErc1155LazyAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ERC1155_Lazy
        contract:
          $ref: '#/components/schemas/ContractAddress'
        collection:
          $ref: '#/components/schemas/CollectionId'
        tokenId:
          $ref: '#/components/schemas/BigInteger'
        uri:
          type: string
        supply:
          $ref: '#/components/schemas/BigInteger'
        creators:
          type: array
          description: Creators of the target item
          default: []
          items:
            $ref: '#/components/schemas/Creator'
        royalties:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Royalty'
        signatures:
          type: array
          default: []
          items:
            type: string
      required:
      - '@type'
      - contract
      - tokenId
      - uri
      - creators
      - supply
      - royalties
      - signatures
    CollectionsSearchFilter:
      type: object
      description: Filter for collections search query
      properties:
        blockchains:
          type: array
          items:
            $ref: '#/components/schemas/Blockchain'
        text:
          type: string
          example: Apes
      required:
      - text
    ItemRoyalty:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ROYALTY
        royalties:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Royalty'
      required:
      - '@type'
      - royalties
    Trait:
      title: Trait
      type: object
      description: Combination of Item attribute key with list of values
      required:
      - key
      - values
      properties:
        key:
          $ref: '#/components/schemas/TraitEntry'
        values:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TraitEntry'
    DuplicatedItemGroups:
      type: object
      properties:
        continuation:
          type: string
          description: Continuation token to paginate duplicates
        groups:
          type: array
          description: List of duplicated item groups
          default: []
          items:
            $ref: '#/components/schemas/DuplicatedItem'
      required:
      - groups
    OrderMatchSwap:
      type: object
      required:
      - left
      - right
      properties:
        '@type':
          type: string
          enum:
          - SWAP
        left:
          $ref: '#/components/schemas/OrderActivityMatchSide'
        right:
          $ref: '#/components/schemas/OrderActivityMatchSide'
    ItemTraitProperty:
      title: ItemTraitProperty
      type: object
      description: Item trait property
      required:
      - key
      properties:
        key:
          type: string
          example: Hat
        value:
          type: string
          example: Halo
        values:
          type: array
          items:
            type: string
    EthOrderBasicSeaportDataV1:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ETH_BASIC_SEAPORT_DATA_V1
      required:
      - '@type'
    TraitSort:
      title: TraitSort
      type: object
      description: Used when the search sort is set as TRAIT
      required:
      - key
      properties:
        key:
          type: string
          description: Trait key
          example: hat
        order:
          $ref: '#/components/schemas/SortOrder'
        type:
          $ref: '#/components/schemas/SortType'
    UnionApiErrorServerError:
      required:
      - code
      - message
      type: object
      properties:
        code:
          type: string
          enum:
          - UNKNOWN
          default: UNKNOWN
        message:
          type: string
          description: Error message
    ItemCollection:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/CollectionId'
        name:
          type: string
        bestBidOrder:
          $ref: '#/components/schemas/Order'
        bestSellOrder:
          $ref: '#/components/schemas/Order'
      required:
      - id
      - name
    CurrencyId:
      type: string
      description: Currency Id, has format `ETHEREUM:${token}` or `ETHEREUM:${token}:${tokenId}`
      example: ETHEREUM:0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2
    SearchResultCount:
      type: object
      properties:
        count:
          type: integer
          format: int64
      required:
      - count
    Traits:
      type: object
      properties:
        continuation:
          type: string
          description: Continuation token to paginate traits search result
        traits:
          type: array
          description: List of found traits
          default: []
          items:
            $ref: '#/components/schemas/Trait'
      required:
      - traits
    SolanaSolAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - SOLANA_SOL
      required:
      - '@type'
    AssetType:
      type: object
      oneOf:
      - $ref: '#/components/schemas/NativeCurrencyAssetType'
      - $ref: '#/components/schemas/TokenCurrencyAssetType'
      - $ref: '#/components/schemas/NftAssetType'
      - $ref: '#/components/schemas/NftOfCollectionAssetType'
      - $ref: '#/components/schemas/EthEthereumAssetType'
      - $ref: '#/components/schemas/EthErc20AssetType'
      - $ref: '#/components/schemas/EthErc721AssetType'
      - $ref: '#/components/schemas/EthErc721LazyAssetType'
      - $ref: '#/components/schemas/EthErc1155AssetType'
      - $ref: '#/components/schemas/EthErc1155LazyAssetType'
      - $ref: '#/components/schemas/EthCryptoPunksAssetType'
      - $ref: '#/components/schemas/EthGenerativeArtAssetType'
      - $ref: '#/components/schemas/EthCollectionAssetType'
      - $ref: '#/components/schemas/SolanaNftAssetType'
      - $ref: '#/components/schemas/SolanaFtAssetType'
      - $ref: '#/components/schemas/SolanaSolAssetType'
    Meta:
      type: object
      properties:
        name:
          type: string
          description: Name of the NFT item
        description:
          type: string
          description: Description of the NFT item
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string
        language:
          description: Language in RFC 1176 format
          type: string
        rights:
          type: string
        rightsUri:
          type: string
        externalUri:
          description: URI to external page related to the Item
          type: string
        originalMetaUri:
          description: URI to the original meta JSON
          type: string
        attributes:
          type: array
          description: Attributes of the NFT item
          items:
            $ref: '#/components/schemas/MetaAttribute'
        content:
          type: array
          description: NFT content information
          items:
            $ref: '#/components/schemas/MetaContent'
        extraContent:
          type: array
          description: NFT additional content information
          items:
            $ref: '#/components/schemas/MetaContent'
      required:
      - name
      - attributes
      - content
    Payout:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/UnionAddress'
        value:
          type: integer
      required:
      - account
      - value
    BigDecimal:
      type: string
      example: 123456.789
    OrderData:
      type: object
      oneOf:
      - $ref: '#/components/schemas/RawOrderData'
      - $ref: '#/components/schemas/EthOrderDataLegacy'
      - $ref: '#/components/schemas/EthRaribleV2OrderData'
      - $ref: '#/components/schemas/EthOrderOpenSeaV1DataV1'
      - $ref: '#/components/schemas/EthOrderSeaportDataV1'
      - $ref: '#/components/schemas/EthOrderCryptoPunksData'
      - $ref: '#/components/schemas/SolanaAuctionHouseDataV1'
    EthErc20AssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ERC20
        contract:
          $ref: '#/components/schemas/ContractAddress'
      required:
      - '@type'
      - contract
    MetaAttribute:
      required:
      - key
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        type:
          type: string
        format:
          type: string
    OrderListActivity:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - LIST
        orderId:
          $ref: '#/components/schemas/OrderId'
        hash:
          type: string
        maker:
          $ref: '#/components/schemas/UnionAddress'
        make:
          $ref: '#/components/schemas/Asset'
        take:
          $ref: '#/components/schemas/Asset'
        price:
          $ref: '#/components/schemas/BigDecimal'
        priceUsd:
          $ref: '#/components/schemas/BigDecimal'
        source:
          $ref: '#/components/schemas/OrderActivitySource'
      required:
      - '@type'
      - hash
      - maker
      - make
      - take
      - price
    MintActivity:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - MINT
        owner:
          $ref: '#/components/schemas/UnionAddress'
        contract:
          $ref: '#/components/schemas/ContractAddress'
        collection:
          $ref: '#/components/schemas/CollectionId'
        tokenId:
          $ref: '#/components/schemas/BigInteger'
        itemId:
          $ref: '#/components/schemas/ItemId'
        value:
          $ref: '#/components/schemas/BigInteger'
        mintPrice:
          $ref: '#/components/schemas/BigDecimal'
        mintPayment:
          $ref: '#/components/schemas/Asset'
        mintPriceUsd:
          $ref: '#/components/schemas/BigDecimal'
        transactionHash:
          type: string
        blockchainInfo:
          $ref: '#/components/schemas/ActivityBlockchainInfo'
      required:
      - '@type'
      - owner
      - value
      - transactionHash
    L2DepositActivity:
      type: object
      required:
      - '@type'
      - user
      - status
      - itemId
      properties:
        '@type':
          type: string
          enum:
          - L2_DEPOSIT
        user:
          $ref: '#/components/schemas/UnionAddress'
        status:
          type: string
        itemId:
          $ref: '#/components/schemas/ItemId'
        collection:
          $ref: '#/components/schemas/CollectionId'
        value:
          $ref: '#/components/schemas/BigInteger'
    Items:
      type: object
      properties:
        total:
          deprecated: true
          type: integer
          format: int64
          description: Number of items were found by request
        continuation:
          type: string
          description: Continuation token to paginate items search result
        items:
          type: array
          description: List of found items
          default: []
          items:
            $ref: '#/components/schemas/Item'
      required:
      - items
    Ownerships:
      type: object
      properties:
        total:
          deprecated: true
          type: integer
          format: int64
          description: Number of ownerships were found by request
        continuation:
          type: string
          description: Continuation token to paginate Ownerships search result
        ownerships:
          type: array
          default: []
          description: List of found ownerships
          items:
            $ref: '#/components/schemas/Ownership'
      required:
      - ownerships
    EthOrderDataRaribleV2DataV3:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ETH_RARIBLE_V2_3
        payouts:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Payout'
        originFees:
          type: array
          default: []
          items:
            $ref: '#/components/schemas/Payout'
        isMakeFill:
          type: boolean
          description: If true, the 'fill' part of the order applies to the 'make' side, otherwise to the 'take' side
      required:
      - '@type'
      - payouts
      - originFees
      - isMakeFill
    NftAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - NFT
        collectionId:
          $ref: '#/components/schemas/CollectionId'
        itemId:
          $ref: '#/components/schemas/ItemId'
        standard:
          type: string
          enum:
          - SINGLE
          - MULTIPLE
      required:
      - '@type'
      - itemId
      - collectionId
    Activity:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/ActivityId'
        date:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
        cursor:
          type: string
        reverted:
          type: boolean
        version:
          type: integer
          format: int64
      oneOf:
      - $ref: '#/components/schemas/MintActivity'
      - $ref: '#/components/schemas/BurnActivity'
      - $ref: '#/components/schemas/TransferActivity'
      - $ref: '#/components/schemas/SendToChainActivity'
      - $ref: '#/components/schemas/ReceiveFromChainActivity'
      - $ref: '#/components/schemas/OrderMatchActivity'
      - $ref: '#/components/schemas/OrderBidActivity'
      - $ref: '#/components/schemas/OrderListActivity'
      - $ref: '#/components/schemas/OrderCancelBidActivity'
      - $ref: '#/components/schemas/OrderCancelListActivity'
      - $ref: '#/components/schemas/L2DepositActivity'
      - $ref: '#/components/schemas/L2WithdrawalActivity'
      required:
      - id
      - date
    TraitRange:
      title: TraitRange
      type: object
      description: Trait value range
      required:
      - key
      - valueRange
      properties:
        key:
          type: string
          example: Hat
        valueRange:
          $ref: '#/components/schemas/Range'
    SolanaNftAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - SOLANA_NFT
        contract:
          $ref: '#/components/schemas/ContractAddress'
        collection:
          $ref: '#/components/schemas/CollectionId'
        itemId:
          $ref: '#/components/schemas/ItemId'
      required:
      - '@type'
      - itemId
    OrderMatchActivity:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - MATCH
        orderId:
          $ref: '#/components/schemas/OrderId'
        source:
          $ref: '#/components/schemas/OrderActivitySource'
        transactionHash:
          type: string
        blockchainInfo:
          $ref: '#/components/schemas/ActivityBlockchainInfo'
      required:
      - source
      - transactionHash
      oneOf:
      - $ref: '#/components/schemas/OrderMatchSwap'
      - $ref: '#/components/schemas/OrderMatchSell'
    L2WithdrawalActivity:
      type: object
      required:
      - '@type'
      - user
      - status
      - itemId
      properties:
        '@type':
          type: string
          enum:
          - L2_WITHDRAWAL
        user:
          $ref: '#/components/schemas/UnionAddress'
        status:
          type: string
        itemId:
          $ref: '#/components/schemas/ItemId'
        collection:
          $ref: '#/components/schemas/CollectionId'
        value:
          $ref: '#/components/schemas/BigInteger'
    TokenCurrencyAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - CURRENCY_TOKEN
        contract:
          $ref: '#/components/schemas/ContractAddress'
      required:
      - '@type'
      - contract
    EthEthereumAssetType:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - ETH
        blockchain:
          $ref: '#/components/schemas/Blockchain'
      required:
      - '@type'
    Asset:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/AssetType'
        value:
          $ref: '#/components/schemas/BigDecimal'
      required:
      - type
      - value
    ImageContent:
      type: object
      properties:
        '@type':
          type: string
          enum:
          - IMAGE
        width:
          type: integer
        height:
          type: integer
    DuplicatedItemsSearchRequest:
      type: object
      description: Search request for items with duplicated traits
      required:
      - size
      - filter
      - traits
      properties:
        size:
          minimum: 1
          maximum: 1000
          default: 50
          type: integer
          format: int32
          description: Number of entities returned
        continuation:
          type: string
          description: Continuation token to paginate items search result
        filter:
          $ref: '#/components/schemas/ItemsSearchFilter'
        traits:
